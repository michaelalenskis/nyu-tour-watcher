name: NYU Tour Watcher
# re-register schedule

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub's minimum)
  workflow_dispatch:          # allow manual runs

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Skip if already registered
        run: |
          if [ -f registered.done ]; then
            echo "Already registered. Exiting."
            exit 0
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        run: node watcher.js

      - name: Commit registered.done if created
        run: |
          if [ -f registered.done ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add registered.done
            git commit -m "chore: mark April 9 tour as registered"
            git push
          fi
